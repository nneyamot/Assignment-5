<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home</title>

    <!-- fontsawesome  -->

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <!-- tailwind and css  -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- google fonts  -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="./style/style.css">


</head>

<body class="bg-gray-50">

    <header class="flex justify-between items-center p-5  mt-5 mx-auto w-11/12 shadow-xl rounded-lg">
        <h1 class="font-bold text-2xl">All Issues </h1>
        <div class="flex gap-2 align-center items-center">
            <input type="text" placeholder="Search" class="input input-bordered w-24 md:w-auto" />
            <div class=" ">
                <button class="btn btn-primary">Search</button>
            </div>
        </div>
    </header>

    <section class="w-11/12 mx-auto pt-5"> 
        <div class="flex gap-3 bg-white shadow-md rounded-lg p-2">
            <button onclick="allBtnLoad()" class="btn">All</button>
            <button class="btn">Open</button>
            <button class="btn">Closed</button>
        </div>
    </section>

    <section class="w-11/12 mx-auto p-3 flex justify-between shadow-sm rounded-sm  mt-5 mb-10">
        <div class=" ">
            <div class="flex items-center gap-3 ">
                <img class="h-full rounded-full text-[#4A00FF]" src="./assets/Aperture.png" alt="">
                <div>
                    <h1 class="font-semibold text-2xl"><span id="number-of-card">500</span> Issues</h1>
                    <p>Track and manage your project issues</p>
                </div>
            </div>
        </div>

        <div class="flex gap-3 justify-center items-center">
            <h1 class="font-semibold"> <i class="fa-solid fa-circle text-[#00A96E]"></i> Open</h1>
            <h1 class="font-semibold"> <i class="fa-solid fa-circle text-[#A855F7]"></i> Closed</h1>
        </div>
    </section>


    <section id="div-container" class=" bg-white w-11/12 mx-auto grid grid-cols-3 gap-5 mb-10"> 
    </section>


    <script src="./js/index.js"></script>
</body>

</html>
