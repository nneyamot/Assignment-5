<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>login</title>
    <link rel="stylesheet" href="./assets/github-logo.png">

    <!-- fontsawesome  -->

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <!-- tailwind and css  -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- google fonts  -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="./style/style.css">

</head>

<body>

    <header class="mb-10 mt-10 mx-auto w-11/12 h-[30px]">
        <nav class=" bg-base-100 flex justify-between ">
                <div class="flex gap-3 align-center items-center">
                    <img class=" w-[36px] h-[37px] " src="./assets/github-logo.png" alt="">
                    <h1 class="font-semibold text-2xl text-[#1F2937]">GitHub Issues Tracker</h1>
                    </h1>
                </div>

                <div class="flex gap-2 align-center items-center">
                    <input type="text" placeholder="Search" class="input input-bordered w-24 md:w-auto" />

                    <div class=" ">
                        <button class="btn btn-primary"> +New Issue</button>
                    </div>
                </div>
          

        </nav>
    </header>

    <section class="mx-auto w-[540px] py-6 bg-white shadow-xl rounded-lg">

        <div class="flex flex-col align-center items-center space-y-6 w-11/12 mx-auto py-10">
            <div>
                <img src="./assets/github-logo.png" alt="">
            </div>

            <div class="text-center">
                <h1 class="font-semibold text-2xl">GitHub Issues Tracker</h1>
                <p class="text-sm text-[#64748B] ">Sign in to manage your issues</p>
            </div>

        </div>
        <div class="mx-auto w-11/12 space-y-6 flex flex-col align-center items-center py-6">
            <div>
                <p class="font-medium ">Username</p>
                <input id="user-name" type="text" placeholder="Enter Username" class="w-120 h-10 rounded-sm">
            </div>

            <div>
                <p class="font-medium ">Password</p>
                <input id="user-password" type="password" name="" id="" placeholder="Enter Password"
                    class="w-120 h-10 rounded-sm">

            </div>
            <button id="signin-btn" class="btn btn-primary w-120">Sign In</button>
        </div>

    </section>

    <script src="./js/login.js"></script>

</html>
