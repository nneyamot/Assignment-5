<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home</title>

    <!-- fontsawesome  -->

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <!-- tailwind and css  -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- google fonts  -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="./style/style.css">


</head>

<body class="bg-gray-50">

    <header class="flex justify-between items-center p-5  mt-5 mx-auto w-11/12 shadow-xl rounded-lg">
        <h1 class="font-bold text-2xl">All Issues </h1>
        <div class="flex gap-2 align-center items-center">
            <input type="text" placeholder="Search" class="input input-bordered w-24 md:w-auto" />
            <div class=" ">
                <button class="btn btn-primary">Search</button>
            </div>
        </div>
    </header>

    <section class="w-11/12 mx-auto pt-5">
        <div class="flex gap-3 bg-white shadow-md rounded-lg p-2">
            <button id="btn-all" onclick="allBtn()" class="btn">All</button>
            <button id="btn-open" onclick="openBtn()" class="btn">Open</button>
            <button id="btn-closed" onclick="closedBtn()" class="btn">Closed</button>
        </div>
    </section>

    <section class="w-11/12 mx-auto p-3 flex justify-between shadow-sm rounded-sm  mt-5 mb-10 ">
        <div class=" ">
            <div class="flex items-center gap-3 ">
                <img class="h-full rounded-full text-[#4A00FF]" src="./assets/Aperture.png" alt="">
                <div>
                    <h1 class="font-semibold text-2xl"><span id="number-of-card">00</span> Issues</h1>
                    <p>Track and manage your project issues</p>
                </div>
            </div>
        </div>

        <div class="flex gap-3 justify-center items-center">
            <h1 class="font-semibold"> <i class="fa-solid fa-circle text-[#00A96E]"></i> Open</h1>
            <h1 class="font-semibold"> <i class="fa-solid fa-circle text-[#A855F7]"></i> Closed</h1>
        </div>
    </section>


    <section id="div-container" class=" bg-white w-11/12 mx-auto grid grid-cols-3 gap-5 mb-10 hidden ">
    </section>

    <section id="open-div-container" class=" bg-white w-11/12 mx-auto grid grid-cols-3 gap-5 mb-10 hidden">

    </section>

    <section id="closed-div-container" class=" bg-white w-11/12 mx-auto grid grid-cols-3 gap-5 mb-10 hidden">

    </section>

    <!-- Open the modal using ID.showModal() method -->
    <!-- <button class="btn" onclick="my_modal_5.showModal()">open modal</button> -->
    <dialog id="my_modal_5" class="modal modal-bottom sm:modal-middle">
        <div class="modal-box">
            <div id="details-container" class="">

                <!-- <div class="">
                    <h1>Fix broken image uploads</h1>
                    <div class="flex">
                        <button class="btn open">opened</button>
                        <p>opened by the fahim ahmed </p>
                        <p>22/02/2026</p>
                    </div>
                    <p>The navigation menu doesn't collapse properly on mobile devices. Need to fix the responsive
                        behavior.</p>
                    <div class="flex">
                        <div>
                            <p>Assignee:</p>
                            <h1>Fahim Ahmed</h1>
                        </div>
                        <div>
                            <p>priority:</p>
                            <h1 class="high">High</h1>
                        </div>

                    </div>
                </div> -->

            </div>
            <div class="modal-action">
                <form method="dialog">
                    <!-- if there is a button in form, it will close the modal -->
                    <button class="btn">Close</button>
                </form>
            </div>
        </div>
    </dialog>


    <script src="./js/index.js"></script>

</body>

</html>
